<!-- your-component.component.html -->
<mat-card class="card mt-5" [@borderAnimation]="'animate'">
    <div class="header">
        <h2 class="form-title">Job Seeker Profile</h2>
    </div>
            <form [formGroup]="profileForm"  class="example-form">
      
        <mat-form-field class="form-group">
            <mat-label for="profileName">Profile Name</mat-label>
            <input matInput type="text" id="profileName" formControlName="profileName" required>
        </mat-form-field>

        <mat-form-field class="form-group">
            <mat-label for="profileSummary">Profile Summary</mat-label>
            <textarea matInput id="profileSummary"  rows="4" formControlName="profileSummary"  required></textarea>
        </mat-form-field>

        <button mat-raised-button type="button" class="submit-btn" (click)="addProfile()">Add Profile</button>
    </form>
</mat-card>
